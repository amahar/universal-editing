<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    
    <!-- Universal Editor CORS Library -->
    <script src="https://universal-editor-service.adobe.io/cors.js" async></script>
    
    <!-- AEM Connection Configuration -->
    <meta name="urn:adobe:aue:system:aemconnection" content="aem:https://author-p34771-e1278037.adobeaemcloud.com">
    
    <!-- Universal Editor Service Configuration -->
    <meta name="urn:adobe:aue:config:service" content="https://universal-editor-service.adobe.io">
    
    <!-- Application Scripts -->
    <script src="/scripts/aem.js" type="module"></script>
    <script src="/scripts/scripts.js" type="module"></script>
    <link rel="stylesheet" href="/styles/styles.css"/>
    <title>Universal Editor Getting Started</title>
</head>
<body>
    <main>
        <!-- Hero Block -->
        <div class="hero" data-aue-resource="urn:aemconnection:/content/universal-editor/jcr:content/root/container/hero"
             data-aue-type="container">
            <div>
                <div>
                    <p>Image</p>
                    <p>
                        <img src="/images/hero.jpg" 
                             alt="Hero Image"
                             data-aue-resource="urn:aemconnection:/content/universal-editor/jcr:content/root/container/hero/image"
                             data-aue-type="image">
                    </p>
                </div>
                <div>
                    <p>Text</p>
                    <p data-aue-resource="urn:aemconnection:/content/universal-editor/jcr:content/root/container/hero/text"
                       data-aue-type="text">
                        Welcome to Universal Editor
                    </p>
                </div>
            </div>
        </div>

        <!-- Columns Block -->
        <div class="columns" data-aue-resource="urn:aemconnection:/content/universal-editor/jcr:content/root/container/columns"
             data-aue-type="container">
            <div>
                <div>
                    <p>Column 1</p>
                    <p data-aue-resource="urn:aemconnection:/content/universal-editor/jcr:content/root/container/columns/column1"
                       data-aue-type="text">
                        Content for column 1
                    </p>
                </div>
                <div>
                    <p>Column 2</p>
                    <p data-aue-resource="urn:aemconnection:/content/universal-editor/jcr:content/root/container/columns/column2"
                       data-aue-type="text">
                        Content for column 2
                    </p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
